name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production PWA image
        run: docker build --tag possession-lab:test .
      - name: Start production PWA image
        run: docker run --detach --name possession-lab --publish 8000:8000 possession-lab:test
      - name: Wait for liveness
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs possession-lab
          exit 1
      - name: Verify readiness and PWA shell
        run: |
          curl --fail --silent http://127.0.0.1:8000/readyz | grep --quiet '"status":"ready"'
          curl --fail --silent http://127.0.0.1:8000/app/ | grep --quiet 'POSSESSION LAB'
      - name: Stop container
        if: always()
        run: docker rm --force possession-lab || true

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
